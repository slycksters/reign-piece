<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Reign Piece</title>

    <!-- Redirect Script -->
    <script type="text/javascript">
      // Get the full redirect path from sessionStorage.
      const redirect = sessionStorage.redirect;
      // Clear the stored path.
      delete sessionStorage.redirect;
      // If a redirect path exists, use it to update the history.
      if (redirect) {
        window.history.replaceState(null, null, redirect);
      }
    </script>

    <!-- Primary SEO -->
    <meta name="title" content="Reign Piece" />
    <meta
      name="description"
      content="Dive deep into the world of Reign Piece with comprehensive guides, up-to-date stats, powerful builds, and essential game mechanics."
    />
    <meta
      name="keywords"
      content="Reign Piece, Roblox, Reign Piece Wiki, Reign Piece Roblox, Reign Piece Database"
    />
    <meta name="author" content="Slyckster" />

    <!-- Open Graph (Facebook, Discord, LinkedIn) -->
    <meta property="og:type" content="website" />
    <meta
      property="og:url"
      content="https://slycksters.github.io/reign-piece/"
    />
    <meta property="og:title" content="Reign Piece" />
    <meta
      property="og:description"
      content="Dive deep into the world of Reign Piece with comprehensive guides, up-to-date stats, powerful builds, and essential game mechanics."
    />
    <meta property="og:image" content="./favicon.svg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <!-- Twitter Card (forces side image layout) -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Reign Piece" />
    <meta
      name="twitter:description"
      content="Dive deep into the world of Reign Piece with comprehensive guides, up-to-date stats, powerful builds, and essential game mechanics."
    />
    <meta name="twitter:image" content="./favicon.svg" />

    <!-- Canonical URL -->
    <link rel="canonical" href="https://slycksters.github.io/reign-piece/" />

    <!-- Theme color (mobile browser UI) -->
    <meta name="theme-color" content="#101412" />

    <!-- Robots -->
    <meta name="robots" content="index, follow" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./src/main.jsx"></script>
  </body>
</html>
